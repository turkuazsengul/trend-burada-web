name: Deploy To cPanel (FTP)

on:
  push:
    branches:
      - master

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build for cPanel
        run: CI=false npm run build:cpanel

      - name: Add deploy marker
        run: |
          echo "deployed-at=$(date -u +"%Y-%m-%d %H:%M:%S UTC")" > build/deploy-check.txt
          echo "commit=${GITHUB_SHA}" >> build/deploy-check.txt
          echo "branch=${GITHUB_REF_NAME}" >> build/deploy-check.txt
          cat build/deploy-check.txt

      - name: Upload build artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: build-debug
          path: build/

      - name: Debug build output
        run: |
          echo "Deploy target dir: ${{ secrets.FTP_SERVER_DIR }}"
          ls -la build | sed -n '1,200p'

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpanel-build
          path: build/
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: cpanel-build
          path: build/

      - name: Validate FTP target directory
        run: |
          if [ -z "${{ secrets.FTP_SERVER_DIR }}" ]; then
            echo "FTP_SERVER_DIR is empty"
            exit 1
          fi
          case "${{ secrets.FTP_SERVER_DIR }}" in
            */) echo "FTP_SERVER_DIR ok: ${{ secrets.FTP_SERVER_DIR }}" ;;
            *) echo "FTP_SERVER_DIR must end with /"; exit 1 ;;
          esac

      - name: Deploy build via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./build/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          dangerous-clean-slate: false
